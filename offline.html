<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="color-scheme" content="light dark"/>
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#0f1218" media="(prefers-color-scheme: dark)"/>
<title>Offline — Amao Elijah Portfolio</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;
  --surface:#ffffff;
  --surface-alt:#f7f7f7;
  --text:#111111;
  --muted:#888888;
  --border:#eeeeee;
  --blue:#2563eb;
  --blue-light:#dbeafe;
  --button-bg:#111111;
  --button-text:#ffffff;
  --shadow:rgba(0,0,0,0.12);
  --font:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1218;
    --surface:#151a22;
    --surface-alt:#1d2430;
    --text:#f4f7fb;
    --muted:#a4adba;
    --border:#2b3442;
    --blue-light:rgba(37,99,235,0.18);
    --button-bg:#f4f7fb;
    --button-text:#0f1218;
    --shadow:rgba(0,0,0,0.32);
  }
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
body{display:flex;align-items:center;justify-content:center;padding:2rem}
.offline-card{
  width:min(100%,560px);background:var(--surface);border:1.5px solid var(--border);
  border-radius:24px;padding:2.5rem;box-shadow:0 16px 44px var(--shadow);
}
.offline-badge{
  display:inline-flex;align-items:center;gap:0.45rem;margin-bottom:1.25rem;
  font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--blue);background:var(--blue-light);border:1px solid var(--border);
  border-radius:100px;padding:0.4rem 0.8rem;
}
h1{font-size:clamp(2rem,7vw,3.25rem);line-height:1.05;letter-spacing:-0.03em;margin-bottom:1rem}
p{font-size:0.95rem;line-height:1.8;color:var(--muted);margin-bottom:2rem}
a{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:42px;padding:0.85rem 1.4rem;border-radius:100px;
  background:var(--button-bg);color:var(--button-text);
  font-size:0.85rem;font-weight:700;text-decoration:none;
}
@media(max-width:480px){
  body{padding:1.25rem}
  .offline-card{padding:1.75rem;border-radius:20px}
  a{width:100%}
}
</style>
</head>
<body>
  <main class="offline-card">
    <div class="offline-badge">&#x1F310; Offline Mode</div>
    <h1>You are offline.</h1>
    <p>The portfolio shell is saved on this device after your first visit. Reconnect to refresh live GitHub repositories, external fonts, and remote links.</p>
    <a href="/">Back to Portfolio</a>
  </main>
</body>
</html>
